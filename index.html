<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kasir Modern</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{
            background: #f4f6f9;
        }

        .navbar{
            background: linear-gradient(135deg,#0d6efd,#0dcaf0);
        }

        .card{
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .total-box{
            background: linear-gradient(135deg,#198754,#20c997);
            color: white;
            border-radius: 15px;
            padding: 20px;
        }

        .table th{
            background-color: #0d6efd;
            color: white;
        }

        .btn-custom{
            border-radius: 10px;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark">
    <div class="container">
        <span class="navbar-brand mb-0 h1">
            <i class="bi bi-cart-check-fill"></i>
            Sistem Kasir Modern
        </span>
    </div>
</nav>

<div class="container mt-4">

    <div class="row">

        <!-- Form Produk -->
        <div class="col-lg-4 mb-4">
            <div class="card p-4">
                <h4 class="mb-3">Input Produk</h4>

                <div class="mb-3">
                    <label>Nama Produk</label>
                    <input type="text" id="nama" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Harga</label>
                    <input type="number" id="harga" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Jumlah</label>
                    <input type="number" id="jumlah" class="form-control">
                </div>

                <button onclick="tambahProduk()" class="btn btn-primary w-100 btn-custom">
                    <i class="bi bi-plus-circle"></i> Tambah
                </button>
            </div>
        </div>

        <!-- Tabel Kasir -->
        <div class="col-lg-8">
            <div class="card p-4">

                <h4 class="mb-3">Daftar Belanja</h4>

                <div class="table-responsive">
                    <table class="table table-bordered text-center">
                        <thead>
                            <tr>
                                <th>No</th>
                                <th>Produk</th>
                                <th>Harga</th>
                                <th>Qty</th>
                                <th>Subtotal</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="dataKasir">

                        </tbody>
                    </table>
                </div>

                <div class="row mt-3">
                    <div class="col-md-6 ms-auto">
                        <div class="total-box">
                            <h5>Ringkasan Belanja</h5>
                            <hr>

                            <p>Subtotal :
                                <span class="float-end" id="subtotal">
                                    Rp 0
                                </span>
                            </p>

                            <p>Pajak (10%) :
                                <span class="float-end" id="pajak">
                                    Rp 0
                                </span>
                            </p>

                            <h4>
                                Total :
                                <span class="float-end" id="total">
                                    Rp 0
                                </span>
                            </h4>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </div>

</div>

<script>

let nomor = 1;
let totalBelanja = 0;

function tambahProduk(){

    let nama = document.getElementById("nama").value;
    let harga = parseInt(document.getElementById("harga").value);
    let jumlah = parseInt(document.getElementById("jumlah").value);

    if(nama=="" || isNaN(harga) || isNaN(jumlah)){
        alert("Lengkapi data terlebih dahulu!");
        return;
    }

    let subtotal = harga * jumlah;

    totalBelanja += subtotal;

    let tabel = document.getElementById("dataKasir");

    tabel.innerHTML += `
        <tr>
            <td>${nomor++}</td>
            <td>${nama}</td>
            <td>Rp ${harga.toLocaleString()}</td>
            <td>${jumlah}</td>
            <td>Rp ${subtotal.toLocaleString()}</td>
            <td>
                <button class="btn btn-danger btn-sm"
                    onclick="hapusBaris(this, ${subtotal})">
                    Hapus
                </button>
            </td>
        </tr>
    `;

    hitungTotal();

    document.getElementById("nama").value="";
    document.getElementById("harga").value="";
    document.getElementById("jumlah").value="";
}

function hapusBaris(button, subtotal){

    button.parentElement.parentElement.remove();

    totalBelanja -= subtotal;

    hitungTotal();
}

function hitungTotal(){

    let pajak = totalBelanja * 0.10;
    let total = totalBelanja + pajak;

    document.getElementById("subtotal").innerHTML =
        "Rp " + totalBelanja.toLocaleString();

    document.getElementById("pajak").innerHTML =
        "Rp " + pajak.toLocaleString();

    document.getElementById("total").innerHTML =
        "Rp " + total.toLocaleString();
}

</script>

</body>
  </html>
